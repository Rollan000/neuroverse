<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APES Exam Prep — Minnechaug</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060608;
    --surface: #101014;
    --surface2: #17171d;
    --border: #2a2a33;
    --accent: #b8c6ff;
    --accent2: #9a7cff;
    --accent3: #6d78ff;
    --text: #f1f1f4;
    --muted: #8b8b98;
    --correct: #00ff9d;
    --wrong: #ff4757;
    --warn: #ffd32a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(180,190,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,190,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 24px 16px; }

  /* HEADER */
  .header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 10px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    white-space: nowrap;
  }
  .header h1 {
    font-size: clamp(18px, 4vw, 26px);
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent); }
  .progress-bar-wrap { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .score-pill {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(0,255,157,0.08);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(0,255,157,0.2);
  }

  /* NAV TABS */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab {
    flex: 1; padding: 10px 8px;
    background: transparent;
    border: none; border-radius: 7px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--border);
  }

  /* UNIT FILTER */
  .unit-bar {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 20px;
  }
  .unit-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .unit-btn:hover { border-color: var(--accent3); color: var(--text); }
  .unit-btn.active { background: rgba(123,97,255,0.15); border-color: var(--accent3); color: var(--accent3); }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 16px;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card.active-card::before { opacity: 1; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 16px;
  }
  .unit-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(123,97,255,0.15);
    color: var(--accent3);
    border: 1px solid rgba(123,97,255,0.3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .diff-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .diff-tag.hard { background: rgba(255,71,87,0.12); color: var(--wrong); border: 1px solid rgba(255,71,87,0.25); }
  .diff-tag.medium { background: rgba(255,211,42,0.12); color: var(--warn); border: 1px solid rgba(255,211,42,0.25); }
  .diff-tag.easy { background: rgba(0,255,157,0.1); color: var(--correct); border: 1px solid rgba(0,255,157,0.2); }

  .question-text {
    font-size: clamp(15px, 3vw, 18px);
    font-weight: 600;
    line-height: 1.55;
    margin-bottom: 22px;
    color: var(--text);
  }

  /* MCQ OPTIONS */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    padding: 13px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    display: flex; gap: 12px; align-items: flex-start;
    text-align: left;
  }
  .option:hover:not(.locked) { border-color: var(--accent3); background: rgba(123,97,255,0.08); }
  .option .opt-letter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 16px;
    margin-top: 1px;
  }
  .option.correct {
    border-color: var(--correct);
    background: rgba(120,255,180,0.14);
    color: #f6fff8;
  }
  .option.correct * {
    color: #f6fff8 !important;
  }
  .option.correct .opt-letter {
    color: var(--correct) !important;
  }
  .option.wrong {
    border-color: var(--wrong);
    background: rgba(255,71,87,0.14);
    color: #fff5f5;
  }
  .option.wrong * {
    color: #fff5f5 !important;
  }
  .option.wrong .opt-letter { color: var(--wrong); }
  .option.locked { cursor: default; }
  .option.dim { opacity: 0.4; }

  /* EXPLANATION */
  .explanation {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 8px;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    display: none;
  }
  .explanation.show { display: block; animation: fadeIn 0.3s ease; }
  .explanation strong { color: var(--accent); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* FLASHCARD */
  .flashcard-wrap { perspective: 1000px; cursor: pointer; }
  .flashcard {
    width: 100%;
    min-height: 200px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
    border-radius: 14px;
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .fc-front, .fc-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    padding: 32px 28px;
    display: flex; flex-direction: column;
    justify-content: center;
    border: 1px solid var(--border);
  }
  .fc-front {
    background: var(--surface);
    border-color: var(--border);
  }
  .fc-back {
    background: linear-gradient(135deg, rgba(0,255,157,0.05), rgba(123,97,255,0.05));
    border-color: rgba(0,255,157,0.3);
    transform: rotateY(180deg);
  }
  .fc-hint {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .fc-front .fc-hint { color: var(--accent3); }
  .fc-back .fc-hint { color: var(--accent); }
  .fc-text {
    font-size: clamp(15px, 3vw, 18px);
    font-weight: 600;
    line-height: 1.55;
  }
  .fc-back .fc-text { font-size: clamp(13px, 2.5vw, 15px); font-weight: 500; color: var(--text); line-height: 1.7; }

  /* SELF RATE */
  .self-rate {
    display: none; gap: 8px; margin-top: 16px;
  }
  .self-rate.show { display: flex; animation: fadeIn 0.3s ease; }
  .rate-btn {
    flex: 1; padding: 10px 8px;
    border-radius: 8px; border: 1px solid;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .rate-btn.got-it { border-color: var(--correct); color: var(--correct); background: rgba(0,255,157,0.08); }
  .rate-btn.got-it:hover { background: rgba(0,255,157,0.18); }
  .rate-btn.missed { border-color: var(--wrong); color: var(--wrong); background: rgba(255,71,87,0.08); }
  .rate-btn.missed:hover { background: rgba(255,71,87,0.18); }

  /* FRQ */
  .frq-prompt {
    font-size: 15px; font-weight: 600; line-height: 1.6;
    margin-bottom: 20px;
  }
  .frq-sub {
    font-size: 13px; color: var(--muted);
    margin-bottom: 16px;
    font-family: 'Space Mono', monospace;
  }
  .frq-part {
    margin-bottom: 20px;
    padding: 16px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .frq-part-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .frq-part-q { font-size: 14px; font-weight: 600; margin-bottom: 10px; line-height: 1.5; }
  .frq-part-points {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: var(--accent3); }
  .frq-model-answer {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 6px;
    background: rgba(0,255,157,0.06);
    border: 1px solid rgba(0,255,157,0.2);
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }
  .frq-model-answer.show { display: block; animation: fadeIn 0.3s ease; }
  .frq-model-answer strong { color: var(--accent); display: block; margin-bottom: 6px; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  /* BUTTONS */
  .btn {
    padding: 11px 20px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-primary {
    background: rgba(0,255,157,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-primary:hover { background: rgba(0,255,157,0.2); }
  .btn-secondary {
    background: var(--surface2);
    border-color: var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--muted); }
  .btn-orange {
    background: rgba(255,107,53,0.1);
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn-orange:hover { background: rgba(255,107,53,0.2); }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; }
  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }
  .stat-val.purple { color: var(--accent3); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* PROGRESS DOT ROW */
  .dot-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .dot.current { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }
  .dot.correct { background: var(--correct); }
  .dot.wrong { background: var(--wrong); }

  /* SECTION LABEL */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 14px;
  }


  /* MASCOT */
  .mascot-area {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .mascot-upload-btn {
    backdrop-filter: blur(8px);
  }

  .mascot {
    width: 160px;
    height: 160px;
    object-fit: cover;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    box-shadow: 0 0 30px rgba(0,0,0,0.45);
    animation: mascotFloat 4s ease-in-out infinite;
  }

  @keyframes mascotFloat {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
  }

  @media (max-width: 700px) {
    .mascot {
      width: 110px;
      height: 110px;
    }

    .mascot-area {
      right: 12px;
      bottom: 12px;
    }
  }



  /* NOIR UX ENHANCEMENTS */
  .card {
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  }

  .question-text,
  .fc-text,
  .frq-part-q {
    letter-spacing: 0.15px;
  }

  .option {
    line-height: 1.55;
  }

  .option:hover:not(.locked) {
    transform: translateX(2px);
  }

  textarea {
    line-height: 1.7;
  }

  .header h1 {
    text-shadow: 0 0 20px rgba(184,198,255,0.08);
  }

  /* DYNAMIC MASCOT */
  .mascot {
    transition:
      transform 0.35s ease,
      filter 0.35s ease,
      opacity 0.35s ease,
      left 0.6s cubic-bezier(0.22, 1, 0.36, 1),
      top 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
    opacity: 0.92;
    filter: drop-shadow(0 0 20px rgba(120,130,255,0.25));
  }

  .mascot-thinking {
    transform: scale(1.03) rotate(-2deg);
  }

  .mascot-correct {
    transform: scale(1.08);
    filter: drop-shadow(0 0 28px rgba(180,255,210,0.45));
  }

  .mascot-wrong {
    transform: translateY(3px) rotate(3deg);
    filter: grayscale(0.2) brightness(0.8);
  }

  .mascot-bubble {
    position: fixed;
    max-width: 220px;
    padding: 10px 14px;
    background: rgba(12,12,16,0.95);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 12px;
    line-height: 1.55;
    z-index: 120;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.25s ease;
    pointer-events: none;
  }

  .mascot-bubble.show {
    opacity: 1;
    transform: translateY(0);
  }

  .tabs,
  .stats-bar,
  .card,
  textarea,
  .option {
    border-color: rgba(255,255,255,0.06);
  }

  @media (max-width: 700px) {
    .mascot-bubble {
      max-width: 160px;
      font-size: 11px;
    }
  }



  /* GAMIFICATION */
  .player-meta {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .player-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    opacity: 0.9;
  }

  .currency-wrap {
    display: flex;
    gap: 8px;
  }

  .currency {
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
  }

  .slot-machine {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin: 24px 0;
  }

  .slot-reel {
    width: 90px;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 38px;
    box-shadow: inset 0 0 18px rgba(0,0,0,0.35);
  }

  .reward-pop {
    position: fixed;
    left: 50%;
    top: 20%;
    transform: translateX(-50%);
    padding: 14px 18px;
    border-radius: 12px;
    background: rgba(10,10,15,0.95);
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 999;
    animation: rewardPop 1.6s ease forwards;
    pointer-events: none;
    font-family: 'Space Mono', monospace;
  }

  @keyframes rewardPop {
    0% { opacity:0; transform:translateX(-50%) translateY(8px) scale(0.96); }
    15% { opacity:1; }
    100% { opacity:0; transform:translateX(-50%) translateY(-40px) scale(1.05); }
  }

  .shop-item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    margin-bottom:10px;
    background: rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:10px;
  }

  .unlock-flash {
    animation: unlockFlash 0.7s ease;
  }

  @keyframes unlockFlash {
    0% { box-shadow:0 0 0 rgba(255,255,255,0); }
    50% { box-shadow:0 0 40px rgba(150,170,255,0.35); }
    100% { box-shadow:0 0 0 rgba(255,255,255,0); }
  }


  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="logo">APES</div>
    <h1>Exam Prep <span>2025</span></h1>
    
<div class="player-meta">
  <div class="player-title" id="playerTitle">wanderer</div>
  <div class="currency-wrap">
    <div class="currency study">📘 <span id="studyCoins">0</span></div>
    <div class="currency gamble">🎰 <span id="gambleCoins">0</span></div>
  </div>
</div>

    <div class="progress-bar-wrap">
      <div class="score-pill" id="globalScore">0 / 0</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchMode('flash')">⚡ Flashcards</button>
    <button class="tab" onclick="switchMode('mcq')">📝 MCQ</button>
    <button class="tab" onclick="switchMode('frq')">✍️ FRQ</button>
    <button class="tab" onclick="switchMode('stats')">📊 Stats</button>
    <button class="tab" onclick="switchMode('casino')">🎰 Casino</button>
  </div>

  <!-- UNIT FILTER -->
  <div class="unit-bar" id="unitBar">
    <button class="unit-btn active" onclick="filterUnit('all',this)">All Units</button>
    <button class="unit-btn" onclick="filterUnit(1,this)">U1: Env Systems</button>
    <button class="unit-btn" onclick="filterUnit(2,this)">U2: Biodiversity</button>
    <button class="unit-btn" onclick="filterUnit(3,this)">U3: Populations</button>
    <button class="unit-btn" onclick="filterUnit(4,this)">U4: Earth Systems</button>
    <button class="unit-btn" onclick="filterUnit(5,this)">U5: Land/Water</button>
    <button class="unit-btn" onclick="filterUnit(6,this)">U6: Energy</button>
    <button class="unit-btn" onclick="filterUnit(7,this)">U7: Atmosphere</button>
    <button class="unit-btn" onclick="filterUnit(8,this)">U8: Aquatic</button>
    <button class="unit-btn" onclick="filterUnit(9,this)">U9: Global Change</button>
  </div>

  <!-- FLASH MODE -->
  <div id="flashMode">
    <div class="stats-bar">
      <div class="stat"><span class="stat-val green" id="fcKnow">0</span><span class="stat-label">Got It</span></div>

<script>
// ============================================================
// DATA — Full question bank
// ============================================================

const FLASHCARDS = [
  // UNIT 1 — Env Systems & Ecosystems
  {unit:1,q:"What is the difference between abiotic and biotic factors?",a:"Abiotic = non-living physical/chemical factors (temp, pH, light, water). Biotic = living components (organisms, populations, communities). Both shape ecosystem structure.",diff:"easy"},
  {unit:1,q:"Define ecosystem services and give 2 examples.",a:"Benefits humans get from ecosystems. Examples: provisioning (food, water), regulating (flood control, climate regulation), cultural (recreation), supporting (nutrient cycling).",diff:"easy"},
  {unit:1,q:"What is the 10% rule in energy pyramids?",a:"Only ~10% of energy transfers between trophic levels. 90% lost as heat/metabolism. This limits food chain length and explains why higher trophic levels have less biomass.",diff:"easy"},
  {unit:1,q:"Distinguish between primary and secondary succession.",a:"Primary: starts on bare rock with no soil (pioneer species = lichens). Secondary: begins after disturbance where soil remains (pioneer species = grasses/shrubs). Secondary is faster.",diff:"medium"},
  {unit:1,q:"What is a keystone species? Give an example.",a:"Species with disproportionately large effect on ecosystem relative to its abundance. Example: Sea otters control sea urchin populations, protecting kelp forests.",diff:"medium"},
  {unit:1,q:"Explain negative vs positive feedback loops in ecosystems.",a:"Negative feedback: counteracts change, stabilizes system (e.g. predator-prey cycles). Positive feedback: amplifies change (e.g. melting ice→less reflection→more warming). Most natural systems use negative feedback.",diff:"medium"},
  {unit:1,q:"What is gross vs net primary productivity (GPP vs NPP)?",a:"GPP = total solar energy fixed by plants. NPP = GPP minus plant respiration. NPP = energy available to consumers. Tropical rainforests have highest NPP.",diff:"hard"},
  {unit:1,q:"Describe the nitrogen cycle. What are the key steps?",a:"N₂ fixation (bacteria convert N₂ to NH₃) → Nitrification (NH₃→NO₂→NO₃) → Assimilation (plants absorb NO₃) → Decomposition → Denitrification (NO₃→N₂ back to atmosphere).",diff:"hard"},
  {unit:1,q:"What is eutrophication and what causes it?",a:"Excess nutrients (especially N and P from fertilizer runoff) → algal bloom → algae die → bacterial decomposition consumes O₂ → hypoxic dead zone. Fish and aquatic life die.",diff:"medium"},
  {unit:1,q:"What is the phosphorus cycle unique characteristic?",a:"No atmospheric phase (unlike C and N cycles). P cycles through rocks, soil, water, and organisms only. Released by weathering. Often the limiting nutrient in freshwater systems.",diff:"hard"},
  {unit:1,q:"What is a climax community?",a:"The stable, mature endpoint of ecological succession. Characterized by high biodiversity and complex structure. Examples: mature forest in temperate zones.",diff:"easy"},
  {unit:1,q:"Compare r-selected and K-selected species.",a:"r-selected: many offspring, little parental care, short lifespan, early reproduction (rabbits, insects). K-selected: few offspring, much parental care, long lifespan, later reproduction (elephants, humans).",diff:"medium"},

  // UNIT 2 — Biodiversity
  {unit:2,q:"What are the three levels of biodiversity?",a:"Genetic diversity (variation within species), species diversity (number/variety of species in area), ecosystem diversity (variety of habitats/ecosystems). All three are important for resilience.",diff:"easy"},
  {unit:2,q:"What is the HIPPO acronym for biodiversity threats?",a:"Habitat loss (biggest threat), Invasive species, Pollution, Population growth (humans), Overharvesting. Habitat loss accounts for ~80% of threatened species.",diff:"medium"},
  {unit:2,q:"What makes an invasive species successful?",a:"Often: no natural predators, fast reproduction, broad diet, adaptable. Compete with or predate native species. Examples: zebra mussels, kudzu, cane toads.",diff:"easy"},
  {unit:2,q:"What is an endemic species?",a:"Species found ONLY in a specific geographic location and nowhere else. Highly vulnerable to extinction. Islands and isolated ecosystems have many endemics.",diff:"easy"},
  {unit:2,q:"What is the species-area relationship?",a:"Larger habitat areas support more species. Cutting habitat in half reduces species by ~10–25%. Fragments isolate populations, reducing genetic diversity and increasing extinction risk.",diff:"medium"},
  {unit:2,q:"What are ecosystem services lost with biodiversity loss?",a:"Pollination, pest control, water purification, climate regulation, disease regulation, genetic resources for medicine/agriculture. Biodiversity = ecological insurance policy.",diff:"medium"},
  {unit:2,q:"What is habitat fragmentation?",a:"Breaking continuous habitat into smaller isolated patches. Increases edge effects, reduces interior habitat, isolates populations, creates barriers to migration/gene flow.",diff:"medium"},
  {unit:2,q:"What is bioremediation?",a:"Using living organisms (bacteria, fungi, plants) to clean up pollutants from soil or water. Phytoremediation uses plants. Cost-effective but slow.",diff:"hard"},

  // UNIT 3 — Populations
  {unit:3,q:"What is carrying capacity (K)?",a:"Maximum population size an environment can sustain indefinitely. Determined by limiting factors. Population grows logistically toward K, then levels off.",diff:"easy"},
  {unit:3,q:"What factors determine population growth rate?",a:"Crude Birth Rate - Crude Death Rate + Immigration - Emigration. Express as % = (births - deaths)/total population × 100.",diff:"medium"},
  {unit:3,q:"What is the rule of 70?",a:"Doubling time (years) = 70 / growth rate (%). If population grows at 2%/yr, doubles in 35 years. Used to estimate exponential population growth.",diff:"easy"},
  {unit:3,q:"What is demographic transition model (DTM)?",a:"4 stages: Stage 1 (high birth & death), Stage 2 (death falls, pop booms), Stage 3 (birth falls), Stage 4 (low birth & death, stable pop). Most developed countries in Stage 4.",diff:"hard"},
  {unit:3,q:"What is total fertility rate (TFR)?",a:"Average number of children a woman has in her lifetime. Replacement TFR ≈ 2.1 in developed nations. Below 2.1 = declining population.",diff:"easy"},
  {unit:3,q:"What are density-dependent vs density-independent limiting factors?",a:"Density-dependent: disease, predation, competition, parasitism — affect larger populations more. Density-independent: natural disasters, temperature extremes — affect populations regardless of size.",diff:"medium"},
  {unit:3,q:"What is an age-structure diagram and what can it tell you?",a:"Population pyramid showing age groups by sex. Wide base = growing population. Narrow base = shrinking. Uniform = stable. Useful for predicting future growth/decline and resource needs.",diff:"medium"},
  {unit:3,q:"What is the IPAT equation?",a:"I = P × A × T. Impact = Population × Affluence × Technology. Describes how human population, consumption, and technology together drive environmental impact.",diff:"hard"},

  // UNIT 4 — Earth Systems & Resources
  {unit:4,q:"What is the difference between weather and climate?",a:"Weather = short-term atmospheric conditions at a specific time/place. Climate = average weather patterns over 30+ years in a region. Climate is predictable, weather less so.",diff:"easy"},
  {unit:4,q:"What causes Earth's seasons?",a:"Earth's 23.5° axial tilt, not distance from sun. When N hemisphere tilts toward sun = summer (more direct sunlight, longer days). S hemisphere tilts away = winter.",diff:"easy"},
  {unit:4,q:"Explain the Hadley, Ferrel, and Polar cells.",a:"Atmospheric circulation cells. Hadley (0–30°): warm air rises at equator, cools, descends at 30° (creating deserts). Ferrel (30–60°): mid-latitudes. Polar (60–90°): cold air sinks at poles.",diff:"hard"},
  {unit:4,q:"What is the rain shadow effect?",a:"Moist air rises over mountain, cools, releases precipitation on windward side. Dry air descends on leeward side, creating desert. Example: Sierra Nevada → Great Basin Desert.",diff:"medium"},
  {unit:4,q:"What is El Niño (ENSO) and its effects?",a:"Weakening of trade winds → warm Pacific water shifts east toward Americas. Effects: increased rain on US West Coast/Peru, drought in Australia/SE Asia, disrupted global weather patterns.",diff:"medium"},
  {unit:4,q:"What are the layers of the atmosphere?",a:"Troposphere (weather, 0–12km) → Stratosphere (ozone layer, 12–50km) → Mesosphere (meteors burn) → Thermosphere → Exosphere. Temperature patterns vary by layer.",diff:"medium"},
  {unit:4,q:"What is soil horizon and why does topsoil matter?",a:"O horizon (organic): decomposing matter. A horizon (topsoil): fertile, high organic matter. B horizon (subsoil): leached minerals. C horizon: parent material. Topsoil takes 500+ yrs to form.",diff:"hard"},
  {unit:4,q:"What is the Coriolis effect?",a:"Earth's rotation deflects moving objects/air to the right in N hemisphere, left in S hemisphere. Drives wind patterns and ocean currents. Determines rotation of hurricanes.",diff:"medium"},

  // UNIT 5 — Land & Water Use
  {unit:5,q:"What are the environmental impacts of conventional agriculture?",a:"Soil erosion, habitat loss, water pollution (fertilizer/pesticide runoff), groundwater depletion, GHG emissions (N₂O from fertilizers, CH₄ from livestock), monoculture vulnerability.",diff:"medium"},
  {unit:5,q:"What is the Green Revolution?",a:"1960s–70s agricultural intensification: high-yield crop varieties, synthetic fertilizers, pesticides, irrigation. Dramatically increased food production but increased pollution, water use, and energy dependence.",diff:"medium"},
  {unit:5,q:"What is contour plowing and how does it reduce erosion?",a:"Plowing along the contours of slopes (horizontally) rather than up-down. Creates ridges that slow water flow, reducing runoff and soil erosion. Effective on hills.",diff:"easy"},
  {unit:5,q:"What is integrated pest management (IPM)?",a:"Pest control using multiple strategies: biological controls, crop rotation, resistant varieties, targeted pesticide use. Minimizes pesticide use while maintaining yield.",diff:"medium"},
  {unit:5,q:"What are aquifer types? What is the Ogallala?",a:"Unconfined: rechargeable from surface. Confined (artesian): trapped between impermeable layers, can't recharge easily. Ogallala = huge confined aquifer under Great Plains, being over-pumped (not sustainable).",diff:"hard"},
  {unit:5,q:"What is saltwater intrusion?",a:"Over-pumping coastal aquifers causes saltwater to flow in, contaminating fresh groundwater. Permanent damage. Threat in coastal cities and agricultural regions.",diff:"medium"},
  {unit:5,q:"What are the pros and cons of large dams?",a:"Pros: flood control, water storage, hydroelectric power, irrigation. Cons: habitat destruction, blocks fish migration, sediment trapping, displaces people, methane from reservoirs.",diff:"medium"},
  {unit:5,q:"What is deforestation's impact on the water cycle?",a:"Trees intercept rain and release water slowly (transpiration). Deforestation reduces evapotranspiration → less rainfall locally, increased runoff, flooding, soil erosion, reduced groundwater recharge.",diff:"medium"},
  {unit:5,q:"What is sustainable yield in fishing?",a:"Maximum Sustainable Yield (MSY) = largest catch that can be taken without reducing future populations. Overfishing occurs when catch exceeds MSY. Hard to calculate accurately.",diff:"medium"},
  {unit:5,q:"What is tragedy of the commons?",a:"Shared resources are over-exploited because individuals act in self-interest, depleting the resource for everyone. Solutions: privatization, government regulation, community management.",diff:"easy"},

  // UNIT 6 — Energy Resources
  {unit:6,q:"What is the difference between renewable and nonrenewable energy?",a:"Nonrenewable: finite, forms over millions of years (coal, oil, natural gas, uranium). Renewable: replenished naturally at human timescale (solar, wind, hydro, geothermal, biomass).",diff:"easy"},
  {unit:6,q:"How does coal form and what are its environmental impacts?",a:"Forms from compressed plant matter over millions of years. Impacts: SO₂/NOₓ (acid rain), CO₂ (climate), mercury, particulates, mountaintop removal, coal ash ponds.",diff:"medium"},
  {unit:6,q:"What is hydraulic fracturing (fracking)?",a:"High-pressure water/sand/chemicals injected to fracture shale, releasing trapped natural gas/oil. Concerns: groundwater contamination, methane leaks, induced seismicity, water use.",diff:"medium"},
  {unit:6,q:"How does nuclear fission work and what are its pros/cons?",a:"Uranium atoms split → heat → steam → electricity. Pros: low CO₂, reliable, high energy density. Cons: radioactive waste (lasts 10,000s years), meltdown risk, high cost, mining impacts.",diff:"hard"},
  {unit:6,q:"What is net energy ratio?",a:"Energy output / energy input to produce energy. Coal ≈ 10:1, oil ≈ 20:1, wind ≈ 20:1, corn ethanol ≈ 1.3:1 (barely positive). Higher ratio = more efficient energy source.",diff:"hard"},
  {unit:6,q:"What are CAFE standards?",a:"Corporate Average Fuel Economy standards — US regulations requiring auto manufacturers to achieve minimum average fuel efficiency across their fleet. Reduce oil consumption and emissions.",diff:"medium"},
  {unit:6,q:"What is cogeneration (combined heat and power)?",a:"Capturing waste heat from electricity generation and using it for heating buildings/industrial processes. Increases overall efficiency from ~35% to ~80%. Reduces fuel use.",diff:"hard"},
  {unit:6,q:"Compare photovoltaic vs concentrated solar power.",a:"PV: solar cells directly convert light to electricity. CSP: mirrors concentrate sunlight to heat fluid, drive turbines. CSP can store heat for nighttime generation. PV simpler/cheaper.",diff:"medium"},

  // UNIT 7 — Atmosphere & Climate
  {unit:7,q:"What are the main greenhouse gases and their sources?",a:"CO₂ (fossil fuels, deforestation), CH₄ (livestock, landfills, natural gas), N₂O (fertilizers, livestock), water vapor (natural), CFCs (refrigerants, now banned by Montreal Protocol).",diff:"easy"},
  {unit:7,q:"Explain the enhanced greenhouse effect.",a:"Natural greenhouse effect keeps Earth ~33°C warmer. Human emissions amplify this → more IR radiation trapped → global temperatures rise. Not the greenhouse effect itself but its intensification.",diff:"medium"},
  {unit:7,q:"What is the Montreal Protocol?",a:"1987 international agreement to phase out ozone-depleting substances (CFCs, HCFCs). Most successful environmental treaty — ozone hole is recovering. Shows international cooperation works.",diff:"easy"},
  {unit:7,q:"How does stratospheric ozone depletion occur?",a:"CFCs (chlorofluorocarbons) reach stratosphere → UV breaks them down → Cl atoms catalytically destroy ozone (each Cl destroys 100,000 O₃ molecules). Worst over Antarctica in spring.",diff:"hard"},
  {unit:7,q:"What is acid deposition and what causes it?",a:"SO₂ (from coal burning) and NOₓ (from vehicles) react with water → H₂SO₄ and HNO₃ → acid rain/snow/fog. Damages forests, lakes (kills fish), buildings, health effects.",diff:"medium"},
  {unit:7,q:"What is photochemical smog (LA smog)?",a:"NOₓ + VOCs + sunlight → ozone (ground-level) + PAN + other pollutants. Worse in sunny, warm, calm days. Causes respiratory issues. Primary pollutant: NOₓ. Secondary: O₃.",diff:"medium"},
  {unit:7,q:"What is particulate matter (PM2.5 vs PM10)?",a:"PM2.5 = particles <2.5 micrometers (most dangerous — penetrate deep into lungs). PM10 = particles <10 micrometers. Sources: combustion, construction, dust. Major health concern.",diff:"medium"},
  {unit:7,q:"What is thermal inversion and why is it dangerous?",a:"Normally warm air rises, dispersing pollutants. Inversion: warm air layer traps cold air below, trapping pollutants near ground. Leads to dangerous smog events (Donora 1948, London 1952).",diff:"hard"},
  {unit:7,q:"What are tipping points in climate change?",a:"Thresholds where change becomes self-reinforcing and hard to reverse. Examples: Arctic ice-albedo feedback, permafrost methane release, Amazon dieback, ice sheet collapse.",diff:"hard"},
  {unit:7,q:"What is the albedo effect?",a:"Albedo = reflectivity. Ice/snow has high albedo (reflects sunlight). Dark ocean/land has low albedo (absorbs heat). As ice melts → less reflection → more heat absorbed → positive feedback loop.",diff:"medium"},

  // UNIT 8 — Aquatic & Terrestrial Pollution
  {unit:8,q:"What are point vs non-point source pollution?",a:"Point source: specific, identifiable discharge point (factory pipe, sewage outfall) — easier to regulate. Non-point: diffuse sources across landscape (agricultural runoff, urban stormwater) — harder to control.",diff:"easy"},
  {unit:8,q:"What is biological oxygen demand (BOD)?",a:"Amount of O₂ microorganisms need to decompose organic matter in water. High BOD = lots of organic waste → bacteria use O₂ → dissolved oxygen drops → fish die. Measure of organic pollution.",diff:"medium"},
  {unit:8,q:"What is biomagnification?",a:"Toxins (like DDT, mercury, PCBs) increase in concentration at higher trophic levels. Predators eat many prey, accumulating toxins. Affects eagles, dolphins, humans at top of food chains.",diff:"medium"},
  {unit:8,q:"What is the Clean Water Act?",a:"1972 US law regulating discharge of pollutants into US waters. Established NPDES permit system for point sources. Set goals for fishable/swimmable water quality nationwide.",diff:"easy"},
  {unit:8,q:"What are heavy metals as pollutants? Give examples.",a:"Mercury (coal plants, fish accumulation), lead (old paint, pipes), arsenic (mining, groundwater), cadmium (batteries). Most are neurotoxic. Bioaccumulate in food chains.",diff:"medium"},
  {unit:8,q:"What is endocrine disruptors?",a:"Chemicals that mimic or block hormones (DDT, PCBs, BPA, phthalates, atrazine). Effects on reproduction, development. Intersex fish downstream of wastewater. Affects wildlife and humans.",diff:"hard"},
  {unit:8,q:"What is Superfund (CERCLA)?",a:"1980 US law creating fund to clean up abandoned hazardous waste sites. EPA can force responsible parties to pay. Addresses contaminated land, groundwater. 1,300+ sites nationwide.",diff:"medium"},
  {unit:8,q:"What is the difference between oligotrophic and eutrophic lakes?",a:"Oligotrophic: clear, low nutrients, high O₂, diverse aquatic life. Eutrophic: nutrient-rich, algal blooms, low O₂, fewer species. Natural lakes age toward eutrophic; humans accelerate it.",diff:"medium"},

  // UNIT 9 — Global Change
  {unit:9,q:"What evidence supports anthropogenic climate change?",a:"Rising CO₂ (isotopic signature), warming temperatures (land+ocean+atmosphere), sea level rise, glacial retreat, ocean acidification, shifting seasons, species range shifts. All consistent with models.",diff:"medium"},
  {unit:9,q:"What is ocean acidification and its effects?",a:"CO₂ + H₂O → H₂CO₃ (carbonic acid) → pH drops. Ocean pH down 0.1 units (26% more acidic since industrial revolution). Dissolves calcium carbonate → harms coral, oysters, pteropods.",diff:"hard"},
  {unit:9,q:"What is sea level rise and what causes it?",a:"Two causes: thermal expansion of water as it warms (larger share currently) and melting glaciers/ice sheets. ~3.3mm/year rising. Threatens coastal cities, low-lying nations (Bangladesh, Pacific islands).",diff:"medium"},
  {unit:9,q:"What is the Paris Agreement?",a:"2015 international climate agreement. Goal: limit warming to 1.5–2°C above pre-industrial. Countries submit Nationally Determined Contributions (NDCs). Not legally binding on emissions targets.",diff:"medium"},
  {unit:9,q:"What is environmental justice?",a:"Fair treatment of all people regardless of race, income, nationality in environmental laws/regulations. Low-income/minority communities often disproportionately bear pollution burden. Principle in EPA policy.",diff:"medium"},
  {unit:9,q:"What is sustainability? What are the 3 pillars?",a:"Meeting present needs without compromising future generations (Brundtland definition). Three pillars: Environmental (ecological health), Social (equity/justice), Economic (viable livelihoods).",diff:"easy"},
  {unit:9,q:"What is carbon sequestration?",a:"Removing CO₂ from atmosphere and storing it. Natural: forests, wetlands, oceans. Technological: CCS (carbon capture and storage) at power plants. Forests are most cost-effective.",diff:"medium"},
  {unit:9,q:"What is the precautionary principle?",a:"When an action raises threat of harm, precautionary measures should be taken even without complete scientific certainty. 'Better safe than sorry' applied to environmental policy.",diff:"medium"},
  {unit:9,q:"What are feedback loops in climate change? Give examples of each type.",a:"Negative (stabilizing): CO₂ fertilization (more plants absorb CO₂). Positive (amplifying): ice-albedo, permafrost methane release, water vapor, Amazon dieback. Most climate feedbacks are positive (amplifying).",diff:"hard"},
  {unit:9,q:"What are coral bleaching causes and effects?",a:"Cause: elevated water temp → corals expel symbiotic algae (zooxanthellae) → lose color and food source. If prolonged → death. Also caused by ocean acidification. Mass bleaching events increasing with climate change.",diff:"medium"},
];

const MCQ = [
  // Unit 1
  {unit:1,q:"Which biogeochemical cycle lacks an atmospheric component?",opts:["Carbon cycle","Nitrogen cycle","Phosphorus cycle","Sulfur cycle"],ans:2,exp:"Phosphorus cycles only through rocks, soil, water, and organisms — no gas phase. This makes phosphorus the limiting nutrient in freshwater systems and slow to cycle.",diff:"hard"},
  {unit:1,q:"In an energy pyramid, what percentage of energy typically transfers from one trophic level to the next?",opts:["1%","10%","25%","50%"],ans:1,exp:"Only ~10% of energy passes to the next trophic level. The other 90% is lost as heat during metabolism and cellular respiration. This limits food chain length.",diff:"easy"},
  {unit:1,q:"Which process occurs during primary succession that does NOT occur during secondary succession?",opts:["Immigration of pioneer species","Soil formation from bedrock","Increase in species diversity","Development of a climax community"],ans:1,exp:"Primary succession begins on bare rock with no soil. Pioneer species like lichens break down rock and create soil — a process that doesn't need to happen in secondary succession where soil already exists.",diff:"medium"},
  {unit:1,q:"A lake ecosystem receives 10,000 kcal of solar energy captured by algae. How much energy is available at the tertiary consumer level (3rd trophic above algae)?",opts:["1,000 kcal","100 kcal","10 kcal","1 kcal"],ans:2,exp:"Apply 10% rule three times: 10,000 × 0.1 × 0.1 × 0.1 = 10 kcal. Energy flows: algae→10,000, herbivore→1,000, primary carnivore→100, tertiary→10.",diff:"hard"},
  {unit:1,q:"The removal of wolves from Yellowstone caused deer populations to overgraze riverbanks, leading to erosion. This is an example of:",opts:["A food web","A trophic cascade","Primary succession","Competitive exclusion"],ans:1,exp:"A trophic cascade is when changes at the top of a food chain ripple down to affect lower levels and even abiotic components like stream banks. Wolves returning to Yellowstone restored riverbank vegetation.",diff:"medium"},
  {unit:1,q:"Which ecosystem type has the HIGHEST net primary productivity?",opts:["Open ocean","Tropical rainforest","Temperate grassland","Arctic tundra"],ans:1,exp:"Tropical rainforests have the highest NPP because of year-round warmth, high moisture, and intense sunlight. Open ocean is vast but has low NPP per unit area.",diff:"easy"},
  // Unit 2
  {unit:2,q:"Which of the following is the GREATEST current threat to global biodiversity?",opts:["Invasive species","Overharvesting","Pollution","Habitat destruction"],ans:3,exp:"Habitat destruction accounts for approximately 80% of threatened species. The H in HIPPO stands for Habitat loss — it's by far the biggest driver. Deforestation, wetland drainage, and urban sprawl are primary causes.",diff:"easy"},
  {unit:2,q:"An island has 1,000 species when its habitat is 1,000 km². If the island is reduced to 100 km² (10% original size), approximately how many species remain?",opts:["100","500","750","900"],ans:2,exp:"Species-area relationship: S = cA^z. Roughly, halving habitat reduces species ~10–25%. Losing 90% of habitat reduces species by ~50%. So ~500 species remain.",diff:"hard"},
  {unit:2,q:"Which of the following best describes an invasive species?",opts:["A native species that becomes dominant after a disturbance","A non-native species introduced to a new ecosystem that causes harm","Any species that outcompetes others for resources","A species reintroduced to its historic range"],ans:1,exp:"Invasive species are non-native (introduced) to an ecosystem AND cause ecological or economic harm. Not all introduced species become invasive, but those that do often lack natural predators.",diff:"easy"},
  {unit:2,q:"Biodiversity hotspots are defined as areas with:",opts:["High species richness and low human impact","High species richness AND significant habitat loss","Large areas of intact wilderness","The highest number of endemic birds"],ans:1,exp:"Biodiversity hotspots must meet two criteria: exceptionally high species endemism AND have lost >70% of their original habitat. Examples: Madagascar, California Floristic Province, Indo-Burma.",diff:"hard"},
  // Unit 3
  {unit:3,q:"A country has a crude birth rate of 30 per 1,000 and a crude death rate of 10 per 1,000. What is its annual population growth rate?",opts:["0.2%","2%","3%","40%"],ans:1,exp:"Growth rate = (CBR - CDR) / 10 = (30-10)/10 = 2%. Or (30-10) = 20 per 1,000 = 2% per year.",diff:"medium"},
  {unit:3,q:"A country's population grows at 3.5% per year. Using the Rule of 70, in how many years will it double?",opts:["10 years","20 years","35 years","70 years"],ans:1,exp:"Doubling time = 70 / growth rate = 70 / 3.5 = 20 years. The Rule of 70 assumes exponential growth continues.",diff:"easy"},
  {unit:3,q:"Which age-structure diagram indicates a DECLINING population?",opts:["Wide base, narrow top","Uniform width throughout","Narrow base, wide middle","Equal width at all ages"],ans:2,exp:"A narrow base indicates fewer young people being born — fewer are replacing the older generations. This means the population will shrink over time as older cohorts die without replacement.",diff:"medium"},
  {unit:3,q:"Which of the following is a density-INDEPENDENT limiting factor?",opts:["Disease","Predation","A volcanic eruption","Food competition"],ans:2,exp:"Density-independent factors affect populations regardless of their size. Natural disasters, extreme weather, and volcanic eruptions kill proportionally regardless of density. Disease, predation, and competition worsen at higher densities.",diff:"easy"},
  {unit:3,q:"According to the demographic transition model, in which stage does population grow MOST rapidly?",opts:["Stage 1","Stage 2","Stage 3","Stage 4"],ans:1,exp:"Stage 2: Death rates fall dramatically (due to improved medicine/sanitation) while birth rates remain high → rapid population growth. This is where many developing nations were in the 20th century.",diff:"medium"},
  // Unit 4
  {unit:4,q:"Which atmospheric layer contains the ozone layer?",opts:["Troposphere","Stratosphere","Mesosphere","Thermosphere"],ans:1,exp:"The ozone layer is in the stratosphere, 15–35 km above Earth. The troposphere (0–12 km) is where weather occurs. CFCs must travel to the stratosphere before breaking down and destroying ozone.",diff:"easy"},
  {unit:4,q:"Which of the following BEST explains why deserts often form at 30° N and S latitude?",opts:["Cold ocean currents along the coasts","Descending dry air from Hadley cell circulation","Low solar radiation at these latitudes","Proximity to polar regions"],ans:1,exp:"In Hadley cells, warm moist air rises at the equator, cools and drops precipitation. It then descends dry at ~30° latitude, creating high-pressure zones of descending dry air. Most major deserts form here.",diff:"hard"},
  {unit:4,q:"What is the PRIMARY cause of Earth's seasons?",opts:["Earth's varying distance from the sun","Earth's axial tilt of 23.5°","Differences in land vs ocean heating","Changes in solar output"],ans:1,exp:"Earth's 23.5° axial tilt means one hemisphere receives more direct sunlight for part of the year. Earth is actually CLOSER to the sun in January (Northern winter) — proving distance isn't the cause.",diff:"easy"},
  {unit:4,q:"During an El Niño event, which of the following would MOST likely occur?",opts:["Drought in Peru and Ecuador","Stronger-than-normal trade winds","Increased precipitation in the western Pacific","Drought in Australia"],ans:3,exp:"El Niño weakens trade winds, warm Pacific water shifts east. Western Pacific (Australia, Indonesia) dries out. Peru/Ecuador get heavy rain. This is the OPPOSITE of normal conditions.",diff:"hard"},
  // Unit 5
  {unit:5,q:"Which soil horizon is MOST important for agriculture?",opts:["O horizon","A horizon","B horizon","C horizon"],ans:1,exp:"The A horizon (topsoil) is most important — rich in organic matter (humus), nutrients, and microorganisms. The O horizon is surface organic debris. B horizon is subsoil with leached minerals.",diff:"easy"},
  {unit:5,q:"Which farming practice BEST reduces soil erosion on slopes?",opts:["Monoculture planting","Deep tillage","Contour plowing","Irrigation"],ans:2,exp:"Contour plowing creates ridges that run horizontally along slopes, slowing water flow and trapping sediment. No-till, terracing, and windbreaks also reduce erosion.",diff:"easy"},
  {unit:5,q:"The Ogallala Aquifer is considered unsustainable because:",opts:["It is too saline for irrigation","Withdrawal rates far exceed recharge rates","It is too deep to pump economically","It contains contaminated water"],ans:1,exp:"The Ogallala is a fossil aquifer (ancient water) with negligible modern recharge. Current pumping for irrigation withdraws water thousands of times faster than it's replenished. It's being depleted.",diff:"medium"},
  {unit:5,q:"Which practice is an example of integrated pest management (IPM)?",opts:["Applying maximum-dose pesticides preventively","Using natural predators to control pest populations","Eliminating all weeds with herbicides","Rotating crops every year to prevent disease"],ans:1,exp:"IPM uses multiple strategies including biological controls (predators/parasites), crop rotation, resistant varieties, and targeted pesticides only when needed. Both B and D are IPM — B is a clearer biological control example.",diff:"medium"},
  {unit:5,q:"Which of the following is the MOST significant use of freshwater globally?",opts:["Municipal drinking water","Industrial manufacturing","Irrigation for agriculture","Thermoelectric power cooling"],ans:2,exp:"Agriculture uses ~70% of global freshwater withdrawals for irrigation. Industrial use is ~20% and municipal/domestic is ~10%. This is why agricultural water efficiency is critical.",diff:"medium"},
  // Unit 6
  {unit:6,q:"Which energy source emits the LEAST CO₂ per kilowatt-hour of electricity generated?",opts:["Natural gas","Coal","Nuclear","Oil"],ans:2,exp:"Nuclear emits essentially zero CO₂ during operation. Among fossil fuels: coal > oil > natural gas. Nuclear, wind, and solar have the lowest lifecycle emissions.",diff:"easy"},
  {unit:6,q:"What is the net energy ratio of corn ethanol?",opts:["Strongly positive (10:1)","Moderately positive (5:1)","Barely positive (1.3:1)","Negative (less than 1:1)"],ans:2,exp:"Corn ethanol has a very low net energy ratio (~1.3:1) because of the enormous energy inputs for farming, fertilizer, transportation, and processing. Cellulosic and sugarcane ethanol are better.",diff:"hard"},
  {unit:6,q:"Hydraulic fracturing (fracking) most directly poses which environmental risk?",opts:["Radioactive waste storage","Groundwater contamination","Strip mining of habitats","Ocean oil spills"],ans:1,exp:"Fracking injects high-pressure water/chemicals into shale. Risks include methane migration into groundwater, wastewater disposal (induced earthquakes), and chemical spills. Groundwater contamination is the primary documented concern.",diff:"medium"},
  {unit:6,q:"Which renewable energy source generates electricity through the direct conversion of sunlight?",opts:["Hydropower","Geothermal","Photovoltaic solar","Wind power"],ans:2,exp:"PV (photovoltaic) cells directly convert photons to electrons via the photoelectric effect. Concentrated solar power (CSP) uses sunlight to heat steam. Hydro, geothermal, and wind are not solar conversion.",diff:"easy"},
  {unit:6,q:"Cogeneration increases energy efficiency by:",opts:["Using multiple fuel types simultaneously","Capturing waste heat for additional use","Storing excess electricity in batteries","Combining solar and wind generation"],ans:1,exp:"Cogeneration (CHP) captures waste heat from power generation and uses it for heating. A power plant is ~35% efficient normally; cogeneration can reach ~80% efficiency by using that waste heat.",diff:"medium"},
  // Unit 7
  {unit:7,q:"Which gas has the HIGHEST global warming potential per molecule?",opts:["Carbon dioxide (CO₂)","Methane (CH₄)","Nitrous oxide (N₂O)","Chlorofluorocarbons (CFCs)"],ans:3,exp:"CFCs have GWP of 4,000–12,000x CO₂. N₂O ≈ 298x. CH₄ ≈ 25x. But CO₂ is most impactful overall because of its vast quantity emitted. GWP is per molecule over 100 years.",diff:"hard"},
  {unit:7,q:"The Montreal Protocol (1987) was designed to address:",opts:["Greenhouse gas emissions","Ozone layer depletion","Ocean pollution","Acid rain"],ans:1,exp:"Montreal Protocol targeted ozone-depleting substances, primarily CFCs and HCFCs. It's considered the most successful environmental treaty. The ozone hole is recovering. The Paris Agreement addresses GHGs.",diff:"easy"},
  {unit:7,q:"Acid rain forms when which pollutants react with water in the atmosphere?",opts:["CO₂ and CH₄","SO₂ and NOₓ","O₃ and VOCs","PM2.5 and CO"],ans:1,exp:"SO₂ (from coal combustion) + water → sulfuric acid. NOₓ (from vehicles) + water → nitric acid. These form acid precipitation with pH < 5.6. CO₂ does make rain slightly acidic (pH 5.6) naturally.",diff:"medium"},
  {unit:7,q:"Ground-level ozone (smog) forms from which reaction?",opts:["SO₂ + water vapor","NOₓ + VOCs + sunlight","CO₂ + heat","PM2.5 + humidity"],ans:1,exp:"Photochemical smog: sunlight catalyzes reactions between NOₓ (from vehicles) and VOCs (volatile organic compounds from vehicles, paints, vegetation) to form ground-level O₃ and other oxidants.",diff:"medium"},
  {unit:7,q:"Which of the following BEST describes the ice-albedo feedback loop?",opts:["A negative feedback that stabilizes global temperatures","A positive feedback that amplifies warming","A negative feedback that increases sea ice formation","A positive feedback that reflects more solar radiation"],ans:1,exp:"As ice melts → less white reflective surface → darker ocean/land absorbs more heat → more warming → more melting. This is a positive (amplifying) feedback loop that accelerates climate change.",diff:"medium"},
  {unit:7,q:"Which layer of the atmosphere do weather phenomena occur in?",opts:["Stratosphere","Mesosphere","Thermosphere","Troposphere"],ans:3,exp:"The troposphere (0–12 km) is where all weather occurs. It contains ~75% of atmospheric mass and most water vapor. Temperature decreases with altitude. Stratosphere is where the ozone layer is.",diff:"easy"},
  // Unit 8
  {unit:8,q:"Which best describes biomagnification?",opts:["Toxins break down as they move up food chains","Toxin concentrations increase at higher trophic levels","Small organisms accumulate more toxins than large ones","Toxins are diluted in the environment over time"],ans:1,exp:"Biomagnification: fat-soluble toxins (DDT, mercury, PCBs) accumulate in organism tissue and concentrate as predators eat many prey. Eagles, orcas, and humans at food chain tops are most affected.",diff:"easy"},
  {unit:8,q:"What does high BOD (biological oxygen demand) in water indicate?",opts:["Clean, oxygen-rich water","High levels of organic waste and pollution","Abundant aquatic plant life","Cold temperature of water"],ans:1,exp:"High BOD = high organic waste = bacteria working overtime to decompose it = they consume dissolved oxygen = O₂ drops = fish and aquatic life die. BOD is a key measure of organic water pollution.",diff:"medium"},
  {unit:8,q:"Which body of water would likely have the LOWEST dissolved oxygen?",opts:["A fast-moving mountain stream","A eutrophic lake in summer","A clean oligotrophic lake","A cold, clear ocean surface"],ans:1,exp:"Eutrophic lakes have algal blooms → when algae die, bacteria decompose them → bacteria consume O₂ → hypoxic conditions. Also, warmer water holds less dissolved oxygen than cold water.",diff:"medium"},
  {unit:8,q:"The Clean Water Act primarily regulates:",opts:["Drinking water quality standards","Point source discharges into US waterways","Air quality near waterways","Groundwater quality"],ans:1,exp:"The Clean Water Act (1972) regulates discharge of pollutants into US surface waters through the NPDES permit system. The Safe Drinking Water Act covers drinking water. Groundwater has less federal protection.",diff:"medium"},
  {unit:8,q:"Which type of pollution is HARDEST to control through regulation?",opts:["Factory effluent pipe","Municipal sewage","Agricultural runoff","Industrial spills"],ans:2,exp:"Non-point source pollution like agricultural runoff comes from diffuse, widespread areas rather than identifiable pipes. It's much harder to monitor and regulate than point sources with specific discharge locations.",diff:"medium"},
  // Unit 9
  {unit:9,q:"Ocean acidification is MOST directly caused by:",opts:["Thermal expansion from warming","CO₂ dissolving in seawater","Increased UV radiation","Runoff of acids from land"],ans:1,exp:"CO₂ + H₂O → H₂CO₃ (carbonic acid) which dissociates, releasing H⁺ ions, lowering pH. Oceans have absorbed ~30% of human CO₂ emissions, dropping pH by 0.1 units (26% more acidic).",diff:"medium"},
  {unit:9,q:"Which of the following is the BEST evidence that current climate change is human-caused?",opts:["Rising global temperatures","Increasing CO₂ levels","The carbon isotopic signature of atmospheric CO₂","Melting polar ice"],ans:2,exp:"The isotopic signature is the 'smoking gun.' Fossil fuel CO₂ has a distinct ratio of C-12/C-13/C-14 (depleted in C-14 and C-13). Atmospheric CO₂ shows this exact fossil fuel fingerprint — proving it's from human burning.",diff:"hard"},
  {unit:9,q:"The Paris Agreement sets a target of limiting global warming to:",opts:["0.5°C above pre-industrial","1.5–2°C above pre-industrial","3°C above pre-industrial","4°C above pre-industrial"],ans:1,exp:"Paris Agreement (2015) aims to limit warming to well below 2°C and pursue efforts toward 1.5°C above pre-industrial levels. Countries submit NDCs (Nationally Determined Contributions).",diff:"easy"},
  {unit:9,q:"Which of the following is an example of environmental justice?",opts:["Building a new national park","Requiring wealthy nations to pay more for climate action","Ensuring a low-income community is not disproportionately burdened by a nearby waste facility","Protecting endangered species in remote areas"],ans:2,exp:"Environmental justice focuses on fair treatment — low-income and minority communities are often disproportionately exposed to pollutants, waste facilities, and environmental hazards. It's about equitable protection.",diff:"medium"},
  {unit:9,q:"Which feedback loop MOST directly accelerates permafrost thawing?",opts:["Water vapor feedback","Ice-albedo feedback","Permafrost methane feedback","Cloud feedback"],ans:2,exp:"As permafrost thaws → releases CH₄ (methane, potent GHG) → more warming → more permafrost thaws. This is a powerful positive feedback. The permafrost contains ~1.5 trillion tons of carbon.",diff:"hard"},
  {unit:9,q:"What is the PRIMARY cause of sea level rise currently?",opts:["Melting of the Greenland ice sheet","Thermal expansion of ocean water","Antarctic ice sheet collapse","Melting of Arctic sea ice"],ans:1,exp:"Currently, thermal expansion accounts for ~50% of sea level rise. Melting land ice (glaciers + Greenland + Antarctic) accounts for the rest. Sea ice melting does NOT raise sea level (it's already in water).",diff:"hard"},
];

// ============================================================
// STATE
// ============================================================
let mode = 'flash';
let activeUnit = 'all';

let fcPool = [], fcIdx = 0, fcFlipped = false, fcKnown = new Set(), fcMissed = new Set();
let mcqPool = [], mcqIdx = 0, mcqAnswered = [], mcqScore = {c:0,w:0};
let frqPool = [], frqIdx = 0;

let session = { fcKnow:0, fcMiss:0, mcqC:0, mcqW:0 };

function getFiltered(arr) {
  if (activeUnit === 'all') return [...arr];
  return arr.filter(x => x.unit == activeUnit);
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

// ============================================================
// MODE SWITCH
// ============================================================
function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['flash','mcq','frq','stats'][i]===m);
  });
  document.getElementById('flashMode').classList.toggle('hidden', m!=='flash');
  document.getElementById('mcqMode').classList.toggle('hidden', m!=='mcq');
  document.getElementById('frqMode').classList.toggle('hidden', m!=='frq');
  document.getElementById('statsMode').classList.toggle('hidden', m!=='stats');
  document.getElementById('unitBar').classList.toggle('hidden', m==='stats');
  if(m==='stats') updateStats();
}

// ============================================================
// UNIT FILTER
// ============================================================
function filterUnit(u, btn) {
  activeUnit = u;
  document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  initFlash(); initMCQ(); initFRQ();
}

// ============================================================
// FLASHCARDS
// ============================================================
function initFlash() {
  fcPool = shuffle(getFiltered(FLASHCARDS));
  fcIdx = 0; fcFlipped = false; fcKnown = new Set(); fcMissed = new Set();
  renderFlash();
}

function renderFlash() {
  if(!fcPool.length){
    document.getElementById('fcCardWrap').innerHTML='<div class="card"><p style="color:var(--muted);text-align:center;padding:20px">No cards for this filter.</p></div>';
    return;
  }
  const card = fcPool[fcIdx];
  const wrap = document.getElementById('fcCardWrap');
  wrap.innerHTML = `
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard ${fcFlipped?'flipped':''}" id="fcCard">
        <div class="fc-front">
          <div class="fc-meta" style="display:flex;gap:8px;margin-bottom:12px">
            <span class="unit-tag">Unit ${card.unit}</span>
            <span class="diff-tag ${card.diff}">${card.diff}</span>
          </div>
          <div class="fc-hint">Click to flip ↓</div>
          <div class="fc-text">${card.q}</div>
        </div>
        <div class="fc-back">
          <div class="fc-hint">Answer</div>
          <div class="fc-text">${card.a}</div>
        </div>
      </div>
    </div>`;
  
  // Dots
  const dotRow = document.getElementById('fcDots');
  dotRow.innerHTML = fcPool.slice(0,Math.min(50,fcPool.length)).map((c,i)=>{
    let cls = 'dot';
    if(i===fcIdx) cls+=' current';
    else if(fcKnown.has(i)) cls+=' correct';
    else if(fcMissed.has(i)) cls+=' wrong';
    return `<div class="${cls}"></div>`;
  }).join('');

  document.getElementById('selfRate').classList.toggle('show', fcFlipped);
  updateFCStats();
}

function flipCard() {
  fcFlipped = !fcFlipped;
  const c = document.getElementById('fcCard');
  if(c) c.classList.toggle('flipped', fcFlipped);
  document.getElementById('selfRate').classList.toggle('show', fcFlipped);
}

function rateCard(knew) {
  if(knew) { fcKnown.add(fcIdx); fcMissed.delete(fcIdx); session.fcKnow++; }
  else { fcMissed.add(fcIdx); fcKnown.delete(fcIdx); session.fcMiss++; }
  updateFCStats();
  nextFlash();
}

function nextFlash() {
  if(!fcPool.length) return;
  fcIdx = (fcIdx+1) % fcPool.length;
  fcFlipped = false;
  renderFlash();
}

function shuffleFlash() { initFlash(); }

function reviewMissed() {
  const missed = fcPool.filter((_,i)=>fcMissed.has(i));
  if(!missed.length){ alert('No missed cards yet!'); return; }
  fcPool = shuffle(missed);
  fcIdx=0; fcFlipped=false; fcKnown=new Set(); fcMissed=new Set();
  renderFlash();
}

function updateFCStats() {
  document.getElementById('fcKnow').textContent = fcKnown.size;
  document.getElementById('fcMiss').textContent = fcMissed.size;
  document.getElementById('fcLeft').textContent = fcPool.length - fcKnown.size - fcMissed.size;
}

// ============================================================
// MCQ
// ============================================================
function initMCQ() {
  mcqPool = shuffle(getFiltered(MCQ));
  mcqIdx = 0; mcqAnswered = new Array(mcqPool.length).fill(null);
  mcqScore = {c:0,w:0};
  updateMCQStats();
  renderMCQ();
}

function renderMCQ() {
  if(!mcqPool.length){
    document.getElementById('mcqCardWrap').innerHTML='<div class="card"><p style="color:var(--muted);text-align:center;padding:20px">No questions for this filter.</p></div>';
    return;
  }
  const q = mcqPool[mcqIdx];
  const answered = mcqAnswered[mcqIdx];
  const letters = ['A','B','C','D'];

  const optsHTML = q.opts.map((o,i)=>{
    let cls = 'option';
    if(answered!==null){
      cls+=' locked';
      if(i===q.ans) cls+=' correct';
      else if(i===answered && answered!==q.ans) cls+=' wrong';
      else cls+=' dim';
    }
    return `<button class="${cls}" onclick="answerMCQ(${i})">
      <span class="opt-letter">${letters[i]}</span>
      <span>${o}</span>
    </button>`;
  }).join('');

  const expHTML = answered!==null ? `<div class="explanation show"><strong>Explanation:</strong> ${q.exp}</div>` : '';

  document.getElementById('mcqCardWrap').innerHTML = `
    <div class="card active-card">
      <div class="q-meta">
        <span class="unit-tag">Unit ${q.unit}</span>
        <span class="diff-tag ${q.diff}">${q.diff}</span>
        <span style="margin-left:auto;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">${mcqIdx+1} / ${mcqPool.length}</span>
      </div>
      <div class="question-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      ${expHTML}
    </div>`;

  // Dots
  document.getElementById('mcqDots').innerHTML = mcqPool.slice(0,Math.min(50,mcqPool.length)).map((c,i)=>{
    let cls = 'dot';
    if(i===mcqIdx) cls+=' current';
    else if(mcqAnswered[i]===c.ans) cls+=' correct';
    else if(mcqAnswered[i]!==null) cls+=' wrong';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function answerMCQ(choice) {
  if(mcqAnswered[mcqIdx]!==null) return;
  mcqAnswered[mcqIdx] = choice;
  if(choice===mcqPool[mcqIdx].ans){ mcqScore.c++; session.mcqC++; }
  else { mcqScore.w++; session.mcqW++; }
  updateMCQStats();
  renderMCQ();
}

function nextMCQ() {
  if(!mcqPool.length) return;
  mcqIdx = (mcqIdx+1) % mcqPool.length;
  renderMCQ();
}

function shuffleMCQ() { initMCQ(); }

function updateMCQStats() {
  const total = mcqScore.c + mcqScore.w;
  document.getElementById('mcqCorrect').textContent = mcqScore.c;
  document.getElementById('mcqWrong').textContent = mcqScore.w;
  document.getElementById('mcqPct').textContent = total ? Math.round(mcqScore.c/total*100)+'%' : '—';
  document.getElementById('globalScore').textContent = `${mcqScore.c} / ${total || 0}`;
}

// ============================================================
// FRQ
// ============================================================
function initFRQ() {
  frqPool = shuffle(getFiltered(FRQ));
  frqIdx = 0;
  renderFRQ();
}

function renderFRQ() {
  if(!frqPool.length){
    document.getElementById('frqCardWrap').innerHTML='<div class="card"><p style="color:var(--muted);text-align:center;padding:20px">No FRQs for this filter.</p></div>';
    return;
  }
  const frq = frqPool[frqIdx];
  const partsHTML = frq.parts.map((p,i)=>`
    <div class="frq-part">
      <div class="frq-part-label">${p.label}</div>
      <div class="frq-part-q">${p.q}</div>
      <div class="frq-part-points">${p.points}</div>
      <textarea placeholder="Write your answer here..." rows="4" id="frqTA_${i}"></textarea>
      <div style="margin-top:8px">
        <button class="btn btn-secondary" style="font-size:12px;padding:7px 14px" onclick="revealFRQPart(${i})">Reveal Model Answer</button>
      </div>
      <div class="frq-model-answer" id="frqAns_${i}">
        <strong>Model Answer</strong>
        ${p.answer}
      </div>
    </div>`).join('');

  document.getElementById('frqCardWrap').innerHTML = `
    <div class="card active-card">
      <div class="q-meta">
        <span class="unit-tag">Unit ${frq.unit}</span>
        <span style="margin-left:auto;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">${frqIdx+1} / ${frqPool.length}</span>
      </div>
      <div class="frq-prompt">${frq.title}</div>
      <div class="frq-sub">SCENARIO: ${frq.scenario}</div>
      ${partsHTML}
    </div>`;
}

function revealFRQPart(i) {
  document.getElementById(`frqAns_${i}`).classList.add('show');
}

function revealAllFRQ() {
  document.querySelectorAll('.frq-model-answer').forEach(el=>el.classList.add('show'));
}

function nextFRQ() {
  if(!frqPool.length) return;
  frqIdx = (frqIdx+1) % frqPool.length;
  renderFRQ();
}

function shuffleFRQ() { initFRQ(); }

// ============================================================
// STATS
// ============================================================
function updateStats() {
  document.getElementById('sTotalCorrect').textContent = session.mcqC;
  document.getElementById('sTotalWrong').textContent = session.mcqW;
  document.getElementById('sFlashKnow').textContent = session.fcKnow;
  document.getElementById('sFlashMiss').textContent = session.fcMiss;

  // Unit breakdown
  const units = [1,2,3,4,5,6,7,8,9];
  const names = ['','Env Systems','Biodiversity','Populations','Earth Systems','Land & Water','Energy','Atmosphere','Aquatic Pollution','Global Change'];
  const html = units.map(u=>{
    const uQ = MCQ.filter(q=>q.unit===u);
    const answered = uQ.filter((_,i)=>{
      const poolIdx = mcqPool.findIndex(q=>q===uQ[i]);
      return poolIdx>=0 && mcqAnswered[poolIdx]!==null;
    });
    return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span class="unit-tag">U${u}</span>
      <span style="font-size:13px;flex:1">${names[u]}</span>
      <span style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)">${uQ.length} MCQ · ${FLASHCARDS.filter(f=>f.unit===u).length} FC</span>
    </div>`;
  }).join('');
  document.getElementById('unitBreakdown').innerHTML = html;
}

function resetAll() {
  session = {fcKnow:0,fcMiss:0,mcqC:0,mcqW:0};
  initFlash(); initMCQ(); initFRQ();
  switchMode('flash');
}

initFlash(); initMCQ(); initFRQ();



// ============================================================
// GAMIFICATION SYSTEM
// ============================================================

let studyCurrency = parseInt(localStorage.getItem('studyCurrency') || '0');
let gambleCurrency = parseInt(localStorage.getItem('gambleCurrency') || '0');
let playerTitle = localStorage.getItem('playerTitle') || 'wanderer';

const studyCoinsEl = document.getElementById('studyCoins');
const gambleCoinsEl = document.getElementById('gambleCoins');
const playerTitleEl = document.getElementById('playerTitle');

const slotIcons = ['☠️','🌙','🕯️','🦇','🎰','🃏'];

const shopPool = [
  {name:'Title: oog spiller', cost:40, type:'title'},
  {name:'Title: hog cranker', cost:55, type:'title'},
  {name:'Title: alpha', cost:70, type:'title'},
  {name:'Title: beta', cost:60, type:'title'},
  {name:'Title: omega', cost:95, type:'title'},
  {name:'Shadow Completion Flash', cost:45, type:'effect'},
  {name:'Cold Blue Theme', cost:80, type:'theme'},
  {name:'Void Theme', cost:100, type:'theme'},
];

function updateCurrencies() {
  studyCoinsEl.textContent = studyCurrency;
  gambleCoinsEl.textContent = gambleCurrency;
  playerTitleEl.textContent = playerTitle;

  localStorage.setItem('studyCurrency', studyCurrency);
  localStorage.setItem('gambleCurrency', gambleCurrency);
  localStorage.setItem('playerTitle', playerTitle);
}

function rewardPopup(text) {
  const pop = document.createElement('div');
  pop.className = 'reward-pop';
  pop.textContent = text;
  document.body.appendChild(pop);

  setTimeout(() => pop.remove(), 1600);
}

function rewardStudy(amount) {
  studyCurrency += amount;
  updateCurrencies();
  rewardPopup('+' + amount + ' 📘 knowledge');
}

function rewardGamble(amount) {
  gambleCurrency += amount;
  updateCurrencies();
  rewardPopup('+' + amount + ' 🎰 chips');
}

document.addEventListener('click', (e) => {
  const option = e.target.closest('.option');

  if (option) {
    setTimeout(() => {
      if (option.classList.contains('correct')) {
        rewardStudy(3);
        rewardGamble(1);

        document.body.classList.add('unlock-flash');

        setTimeout(() => {
          document.body.classList.remove('unlock-flash');
        }, 700);
      }
    }, 120);
  }
});

function switchMode(mode) {
  document.getElementById('flashMode').classList.add('hidden');
  document.getElementById('mcqMode').classList.add('hidden');
  document.getElementById('frqMode').classList.add('hidden');
  document.getElementById('statsMode').classList.add('hidden');

  const casino = document.getElementById('casinoMode');
  if (casino) casino.classList.add('hidden');

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  if (mode === 'flash') document.getElementById('flashMode').classList.remove('hidden');
  if (mode === 'mcq') document.getElementById('mcqMode').classList.remove('hidden');
  if (mode === 'frq') document.getElementById('frqMode').classList.remove('hidden');
  if (mode === 'stats') document.getElementById('statsMode').classList.remove('hidden');
  if (mode === 'casino') document.getElementById('casinoMode').classList.remove('hidden');

  event?.target?.classList?.add('active');

  setTimeout(moveMascotNearActiveCard, 120);
}

function spinSlots() {
  if (gambleCurrency < 5) {
    rewardPopup('Not enough 🎰 chips');
    return;
  }

  gambleCurrency -= 5;

  const reels = [
    document.getElementById('slot1'),
    document.getElementById('slot2'),
    document.getElementById('slot3')
  ];

  const results = [];

  reels.forEach((r, i) => {
    const val = slotIcons[Math.floor(Math.random() * slotIcons.length)];
    r.textContent = val;
    results.push(val);
  });

  if (results[0] === results[1] && results[1] === results[2]) {
    rewardGamble(35);
    document.getElementById('slotResult').textContent = 'JACKPOT';
  } else if (results[0] === results[1] || results[1] === results[2]) {
    rewardGamble(10);
    document.getElementById('slotResult').textContent = 'Minor win';
  } else {
    document.getElementById('slotResult').textContent = 'Loss';
  }

  updateCurrencies();
}

function generateShop() {
  const shop = document.getElementById('shopItems');
  if (!shop) return;

  const timer = document.getElementById('shopTimer');

  const now = Date.now();
  const cycle = Math.floor(now / (20 * 60 * 1000));

  const seeded = [...shopPool].sort((a,b) =>
    Math.sin(cycle + a.cost) - Math.sin(cycle + b.cost)
  );

  const items = seeded.slice(0,4);

  shop.innerHTML = '';

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'shop-item';

    div.innerHTML = `
      <div>
        <div style="font-weight:700">${item.name}</div>
        <div style="font-size:12px;color:var(--muted)">rotating item</div>
      </div>
      <button class="btn btn-secondary">Buy ${item.cost}</button>
    `;

    div.querySelector('button').onclick = () => {
      if (gambleCurrency < item.cost) {
        rewardPopup('Need more 🎰 chips');
        return;
      }

      gambleCurrency -= item.cost;

      if (item.type === 'title') {
        playerTitle = item.name.replace('Title: ','').toLowerCase();
      }

      if (item.name.includes('Void')) {
        document.documentElement.style.setProperty('--accent', '#d6d6ff');
        document.documentElement.style.setProperty('--accent3', '#8f8fff');
      }

      if (item.name.includes('Cold Blue')) {
        document.documentElement.style.setProperty('--accent', '#9dc7ff');
        document.documentElement.style.setProperty('--accent3', '#5b88ff');
      }

      updateCurrencies();
      rewardPopup('Unlocked: ' + item.name);
    };

    shop.appendChild(div);
  });

  const mins = 20 - (new Date().getMinutes() % 20);
  timer.textContent = 'Refresh in ~' + mins + ' min';
}

updateCurrencies();
generateShop();

setInterval(generateShop, 60000);

  mascotImg.style.display = 'block';

const mascotBubble = document.getElementById('mascotBubble');

const mascotLines = {
  idle: [
    "Focus mode engaged.",
    "Read slowly. Retention matters.",
    "One question at a time.",
    "Patterns repeat across units."
  ],
  correct: [
    "Correct.",
    "You recognized the pattern.",
    "Memory reinforced.",
    "Good read."
  ],
  wrong: [
    "Review the explanation.",
    "This concept links to another unit.",
    "Mistakes build recall.",
    "Look for the underlying process."
  ]
};

function randomLine(type) {
  const arr = mascotLines[type];
  return arr[Math.floor(Math.random() * arr.length)];
}

function showMascotBubble(text) {
  if (!mascotBubble || mascotImg.classList.contains('hidden')) return;

  mascotBubble.textContent = text;

  const rect = mascotImg.getBoundingClientRect();

  mascotBubble.style.left = (rect.left - 230) + 'px';
  mascotBubble.style.top = (rect.top + 10) + 'px';

  mascotBubble.classList.add('show');

  clearTimeout(window.mascotBubbleTimeout);

  window.mascotBubbleTimeout = setTimeout(() => {
    mascotBubble.classList.remove('show');
  }, 2600);
}

function moveMascotNearActiveCard() {
  if (mascotImg.classList.contains('hidden')) return;

  const activeCard =
    document.querySelector('.active-card') ||
    document.querySelector('.card');

  if (!activeCard) return;

  const rect = activeCard.getBoundingClientRect();

  const targetX = Math.min(window.innerWidth - 190, rect.right + 20);
  const targetY = Math.max(80, rect.top + window.scrollY + 30);

  mascotImg.style.position = 'absolute';
  mascotImg.style.left = targetX + 'px';
  mascotImg.style.top = targetY + 'px';
}

setInterval(() => {
  if (!mascotImg.classList.contains('hidden')) {
    mascotImg.classList.add('mascot-thinking');

    setTimeout(() => {
      mascotImg.classList.remove('mascot-thinking');
    }, 1200);
  }
}, 7000);

document.addEventListener('click', (e) => {
  const option = e.target.closest('.option');

  if (option) {
    const isCorrect = option.classList.contains('correct');

    mascotImg.classList.remove('mascot-correct', 'mascot-wrong');

    if (isCorrect) {
      mascotImg.classList.add('mascot-correct');
      showMascotBubble(randomLine('correct'));
    } else {
      mascotImg.classList.add('mascot-wrong');
      showMascotBubble(randomLine('wrong'));
    }

    setTimeout(() => {
      mascotImg.classList.remove('mascot-correct', 'mascot-wrong');
    }, 1600);
  }

  if (
    e.target.closest('.flashcard-wrap') ||
    e.target.closest('.btn')
  ) {
    setTimeout(moveMascotNearActiveCard, 120);
  }
});

window.addEventListener('load', () => {
  setTimeout(() => {
    moveMascotNearActiveCard();

    if (!mascotImg.classList.contains('hidden')) {
      showMascotBubble(randomLine('idle'));
    }
  }, 500);
});

window.addEventListener('resize', moveMascotNearActiveCard);
window.addEventListener('scroll', () => {
  if (window.innerWidth > 700) {
    moveMascotNearActiveCard();
  }
});

const mascotUpload = document.getElementById('mascotUpload');
const mascotImg = document.getElementById('mascotImg');

const savedMascot = localStorage.getItem('apesMascot');

if (savedMascot) {
  mascotImg.src = savedMascot;
  mascotImg.classList.remove('hidden');

mascotUpload.addEventListener('change', (e) => {
  const file = e.target.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    mascotImg.src = event.target.result;
    mascotImg.classList.remove('hidden');

    localStorage.setItem('apesMascot', event.target.result);
  };

  reader.readAsDataURL(file);
});
